{% block open_modal %}
	<script>
		(function(){
			let largeModalEl = document.getElementById("LargeModal");
			if (largeModalEl && !largeModalEl.classList.contains("show")) {
				const largeModal = bootstrap.Modal.getOrCreateInstance(largeModalEl);
				largeModal.show();
			}
		})();

	</script>
{% endblock %}
